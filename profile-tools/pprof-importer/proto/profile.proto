// pprof profile.proto — from github.com/google/pprof
// Trimmed to fields we use.
syntax = "proto3";
package perftools.profiles;

message Profile {
  repeated Sample   sample        = 2;
  repeated Mapping  mapping       = 3;
  repeated Location location      = 4;
  repeated Function function      = 5;
  repeated int64    string_table  = 6;
  repeated ValueType sample_type  = 1;
  int64             period        = 11;
  int64             period_type_index = 12;
  int64             duration_nanos = 10;
  repeated int64    comment       = 13;
}

message ValueType {
  int64 type  = 1;
  int64 unit  = 2;
}

message Sample {
  repeated uint64 location_id = 1;
  repeated int64  value       = 2;
  repeated Label  label       = 3;
}

message Label {
  int64 key   = 1;
  int64 str   = 2;
  int64 num   = 3;
}

message Mapping {
  uint64 id         = 1;
  uint64 memory_start = 2;
  uint64 memory_limit = 3;
  uint64 file_offset  = 4;
  int64  filename   = 5;
  int64  build_id   = 6;
  bool   has_functions = 7;
  bool   has_filenames = 8;
  bool   has_line_numbers = 9;
  bool   has_inline_frames = 10;
}

message Location {
  uint64  id        = 1;
  uint64  mapping_id = 2;
  uint64  address   = 3;
  repeated Line line = 4;
  bool    is_folded = 5;
}

message Line {
  uint64 function_id = 1;
  int64  line        = 2;
}

message Function {
  uint64 id         = 1;
  int64  name       = 2;
  int64  system_name = 3;
  int64  filename   = 4;
  int64  start_line = 5;
}
