name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -----------------------------------------------------------------------
  # TypeScript: typecheck + unit tests
  # -----------------------------------------------------------------------
  typescript:
    name: "TS — typecheck & unit tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: "9.1.0"

      - uses: actions/setup-node@v4
        with:
          node-version: "20.11.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck extension
        run: pnpm --filter perf-lens run typecheck

      - name: Unit tests (extension)
        run: pnpm --filter perf-lens run test

  # -----------------------------------------------------------------------
  # C++ sidecar: build + unit tests (with LLVM for static analysis rules)
  # -----------------------------------------------------------------------
  sidecar:
    name: "C++ — build & unit tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools + LLVM 19
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake gcc g++ \
            clang-19 llvm-19-dev libclang-cpp19-dev

      - name: Configure (with LLVM)
        run: |
          cmake -S sidecar -B sidecar/build \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DLLVM_DIR=/usr/lib/llvm-19/lib/cmake/llvm \
            -DClang_DIR=/usr/lib/llvm-19/lib/cmake/clang \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build sidecar/build --parallel

      - name: C++ unit tests
        run: ctest --test-dir sidecar/build --output-on-failure --parallel 4

  # -----------------------------------------------------------------------
  # Integration: extension ↔ sidecar end-to-end (ping / echo)
  # -----------------------------------------------------------------------
  integration:
    name: "Integration — extension ↔ sidecar"
    runs-on: ubuntu-latest
    needs: [typescript, sidecar]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: "9.1.0"

      - uses: actions/setup-node@v4
        with:
          node-version: "20.11.0"
          cache: "pnpm"

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake gcc g++

      - name: Install TS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build sidecar (without LLVM for integration job speed)
        run: |
          cmake -S sidecar -B sidecar/build \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build sidecar/build --parallel

      - name: Integration tests
        run: pnpm --filter integration-tests run test
